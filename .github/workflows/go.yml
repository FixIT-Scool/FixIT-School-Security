# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.18' # Aggiornato a 1.18 come il tuo go.mod
        cache: true

    # SOSTITUITO: go mod tidy genera il file go.sum mancante automaticamente
    - name: Sync and download dependencies
      run: go mod tidy

    # Ora il build troverà tutte le voci nel go.sum e passerà senza problemi
    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -v ./...
